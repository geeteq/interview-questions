# ── HTTP → redirect to HTTPS ───────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName interview.yourdomain.com
    Redirect permanent / https://interview.yourdomain.com/
</VirtualHost>

# ── HTTPS reverse proxy → Gunicorn on 127.0.0.1:5001 ─────────────────────────
<VirtualHost *:443>
    ServerName interview.yourdomain.com

    # TLS — replace with your actual cert paths (e.g. Let's Encrypt)
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/interview.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/interview.yourdomain.com/privkey.pem

    # Forward real client IP and protocol to Flask
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Proxy everything to Gunicorn
    ProxyPass        / http://127.0.0.1:5001/
    ProxyPassReverse / http://127.0.0.1:5001/

    # Logs
    ErrorLog  /var/log/apache2/interview-questions-error.log
    CustomLog /var/log/apache2/interview-questions-access.log combined
</VirtualHost>
